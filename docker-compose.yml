version: '3.9'
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    ports:
      - '8080:8080'

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://api:8080
      API_URL: http://api:8080
      NEXT_PUBLIC_PI_RPC_URL: https://rpc.testnet.minepi.com
      NEXT_PUBLIC_CONTRACT_ID: ${NEXT_PUBLIC_CONTRACT_ID:-}
    ports:
      - '3000:3000'
    depends_on:
      - api
